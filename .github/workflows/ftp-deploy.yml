name: Deploy to GlobeHost via FTP

on:
  push:
    branches: [ main ]      # auto-deploys on every push to main (including from mobile)
  workflow_dispatch:         # adds a "Run workflow" button in the GitHub mobile app

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -c "
            set ftp:ssl-allow no;
            set net:timeout 30;
            set net:max-retries 3;
            open -u \"$FTP_USER\",\"$FTP_PASS\" \"$FTP_HOST\";
            mirror --reverse --delete --verbose \
              --exclude-glob .git \
              --exclude-glob .git/ \
              --exclude-glob .github/ \
              --exclude-glob '*.py' \
              --exclude-glob '*.ps1' \
              --exclude-glob '*.vbs' \
              --exclude-glob '*.bat' \
              . /public_html/;
          "
