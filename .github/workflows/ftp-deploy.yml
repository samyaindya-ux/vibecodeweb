name: Deploy to GlobeHost via cPanel API

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test cPanel connectivity (debug)
        run: |
          echo "=== Trying samya:Samya@888 on port 2083 ==="
          curl -sk -o /tmp/r1.txt -w "HTTP:%{http_code}" \
            -u "samya:Samya@888" \
            "https://223.178.211.127:2083/execute/Fileman/list?dir=/public_html" || true
          echo "" && cat /tmp/r1.txt | head -c 500

          echo "=== Trying samya@vibecodeweb.in:Samya@888 on port 2083 ==="
          curl -sk -o /tmp/r2.txt -w "HTTP:%{http_code}" \
            -u "samya@vibecodeweb.in:Samya@888" \
            "https://223.178.211.127:2083/execute/Fileman/list?dir=/public_html" || true
          echo "" && cat /tmp/r2.txt | head -c 500

          echo "=== Trying vibecodeweb.in on port 2083 ==="
          curl -sk -o /tmp/r3.txt -w "HTTP:%{http_code}" \
            -u "samya:Samya@888" \
            "https://vibecodeweb.in:2083/execute/Fileman/list?dir=/public_html" || true
          echo "" && cat /tmp/r3.txt | head -c 500

          echo "=== Trying port 2082 (plain) ==="
          curl -s -o /tmp/r4.txt -w "HTTP:%{http_code}" \
            -u "samya:Samya@888" \
            "http://223.178.211.127:2082/execute/Fileman/list?dir=/public_html" || true
          echo "" && cat /tmp/r4.txt | head -c 500
