name: Deploy to GlobeHost

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Probe open ports on host
        run: |
          echo "=== Port scan ==="
          for port in 21 22 2222 80 443 2082 2083 8080 8443; do
            timeout 5 bash -c "echo > /dev/tcp/223.178.211.127/$port" 2>/dev/null \
              && echo "OPEN: $port" || echo "closed: $port"
          done

      - name: Install tools
        run: sudo apt-get install -y sshpass lftp

      - name: Try FTPS explicit (port 21 with TLS)
        run: |
          lftp -c "
            set ftp:ssl-force true
            set ssl:verify-certificate no
            open -u 'samya@vibecodeweb.in,Samya@888' ftp://223.178.211.127
            ls
          " 2>&1 | head -20 || true

      - name: Try SSH on port 2222
        run: |
          sshpass -p 'Samya@888' ssh -v \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=10 \
            -p 2222 \
            vibec@223.178.211.127 "echo SSH_OK" 2>&1 | tail -20 || true
