name: Deploy to GlobeHost

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get install -y sshpass rsync

      - name: Deploy via rsync over SSH
        run: |
          sshpass -p 'Samya@888' rsync -avz --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '*.py' \
            --exclude '*.ps1' \
            -e "ssh -o StrictHostKeyChecking=no -p 22" \
            ./ vibec@223.178.211.127:/home/vibec/public_html/
        env:
          SSHPASS: Samya@888
