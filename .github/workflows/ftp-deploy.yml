name: Deploy to GlobeHost

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Push files to server via HTTPS
        run: |
          DEPLOY_URL="https://vibecodeweb.in/deploy.php"
          SECRET="vibe_deploy_2026"
          FILES="index.html index2.html robots.txt"

          for FILE in $FILES; do
            if [ ! -f "$FILE" ]; then
              echo "SKIP: $FILE (not in repo)"
              continue
            fi

            CONTENT=$(base64 -w 0 "$FILE")
            PAYLOAD=$(printf '{"file":"%s","content":"%s"}' "$FILE" "$CONTENT")
            SIG=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "$SECRET" | awk '{print $2}')

            echo "Deploying $FILE..."
            RESP=$(curl -s -X POST "$DEPLOY_URL" \
              -H "Content-Type: application/json" \
              -H "X-Deploy-Sig: $SIG" \
              -d "$PAYLOAD")
            echo "  Response: $RESP"
          done
